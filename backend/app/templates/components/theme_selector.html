<!-- backend/app/templates/components/theme_Selector-->
<!-- ======================================================================================= -->

<!-- Selettore tema dark/light senza dipendenze Alpine (CSP-safe). -->

<button
    type="button"
    class="relative inline-flex h-8 w-14 items-center rounded-full border border-gray-200 bg-gray-100 px-1 transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-primary-500 focus:ring-offset-2 dark:border-gray-700 dark:bg-gray-700 dark:focus:ring-offset-gray-900"
    aria-label="Cambia tema"
    role="switch"
    aria-checked="false"
    data-theme-toggle
>
    <span
      class="pointer-events-none absolute left-2 top-1/2 -translate-y-1/2 text-yellow-500 transition-opacity duration-200"
      aria-hidden="true"
      data-theme-track-icon-light
    >
      <i class="ri-sun-line text-xs"></i>
    </span>
    <span
      class="pointer-events-none absolute right-2 top-1/2 -translate-y-1/2 text-indigo-300 transition-opacity duration-200"
      aria-hidden="true"
      data-theme-track-icon-dark
    >
      <i class="ri-moon-line text-xs"></i>
    </span>

    <span
      class="pointer-events-none relative z-10 inline-flex h-6 w-6 transform items-center justify-center rounded-full bg-white shadow transition-transform duration-200 translate-x-0"
      data-theme-thumb
    >
      <i class="ri-sun-line text-sm text-yellow-500" aria-hidden="true" data-theme-thumb-icon-light></i>
      <i class="ri-moon-line hidden text-sm text-indigo-600" aria-hidden="true" data-theme-thumb-icon-dark></i>
    </span>
</button>
