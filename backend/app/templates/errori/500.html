{% extends "base.html" %}

{% block title %}500 - Errore interno{% endblock %}

{% block content %}
<div class="fixed right-4 top-4 z-30">
    {% include "components/theme_selector.html" %}
</div>

<section class="flex min-h-screen items-center justify-center px-4 py-12">
    <div class="w-full max-w-2xl rounded-2xl border border-orange-200 bg-white p-8 shadow-sm dark:border-orange-900/50 dark:bg-gray-900">
        <p class="text-xs font-semibold uppercase tracking-wide text-orange-700 dark:text-orange-300">
            Errore {{ codice_errore }}
        </p>
        <h1 class="mt-2 text-3xl font-bold text-gray-900 dark:text-gray-100">
            {{ titolo_errore }}
        </h1>
        <p class="mt-3 text-sm text-gray-700 dark:text-gray-300">
            {{ messaggio_errore }}
        </p>

        <div class="mt-7 flex flex-wrap gap-3">
            <a
                href="{{ url_home_pubblica }}"
                class="inline-flex items-center rounded-lg bg-orange-600 px-4 py-2 text-sm font-medium text-white hover:bg-orange-700"
            >
                <i class="ri-home-4-line mr-2"></i>
                Vai al sito
            </a>
        </div>
    </div>
</section>
{% endblock %}
